<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iHub Store</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:white;
}

header{
background:#111827;
padding:20px;
text-align:center;
position:relative;
}

.cart{
position:absolute;
right:20px;
top:20px;
background:#22c55e;
padding:10px 15px;
border-radius:5px;
cursor:pointer;
font-weight:bold;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.product{
background:#1f2937;
border-radius:10px;
overflow:hidden;
}

.product img{
width:100%;
height:250px;
object-fit:cover;
}

.product-info{
padding:15px;
}

.product-title{
font-size:20px;
margin-bottom:10px;
}

.price{
color:#60a5fa;
font-size:22px;
font-weight:bold;
margin-bottom:10px;
}

button{
width:100%;
padding:10px;
border:none;
background:#2563eb;
color:white;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:#1d4ed8;
}
</style>
</head>

<body>

<header>
<h1>🍎 iHub</h1>

<div class="cart" onclick="goToCart()">
🛒 Cart: <span id="cartCount">0</span>
</div>
</header>

<div class="container">
<div class="products">

<div class="product">
<img src="iphone.jpg">
<div class="product-info">
<h2 class="product-title">iPhone 15</h2>
<p class="price">₹79,999</p>
<button onclick="addToCart('iPhone 15',79999)">Add to Cart</button>
</div>
</div>

<div class="product">
<img src="samsung.jpg">
<div class="product-info">
<h2 class="product-title">Samsung Galaxy S24</h2>
<p class="price">₹74,999</p>
<button onclick="addToCart('Samsung Galaxy S24',74999)">Add to Cart</button>
</div>
</div>

<div class="product">
<img src="pixel.jpg">
<div class="product-info">
<h2 class="product-title">Google Pixel 8</h2>
<p class="price">₹69,999</p>
<button onclick="addToCart('Google Pixel 8',69999)">Add to Cart</button>
</div>
</div>

<div class="product">
<img src="oneplus.jpg">
<div class="product-info">
<h2 class="product-title">OnePlus 12</h2>
<p class="price">₹64,999</p>
<button onclick="addToCart('OnePlus 12',64999)">Add to Cart</button>
</div>
</div>

<div class="product">
<img src="xiaomi.jpg">
<div class="product-info">
<h2 class="product-title">Xiaomi 14</h2>
<p class="price">₹59,999</p>
<button onclick="addToCart('Xiaomi 14',59999)">Add to Cart</button>
</div>
</div>

<div class="product">
<img src="vivo.jpg">
<div class="product-info">
<h2 class="product-title">Vivo X100</h2>
<p class="price">₹63,999</p>
<button onclick="addToCart('Vivo X100',63999)">Add to Cart</button>
</div>
</div>

<div class="product">
<img src="oppo.jpg">
<div class="product-info">
<h2 class="product-title">Oppo Find X7</h2>
<p class="price">₹61,999</p>
<button onclick="addToCart('Oppo Find X7',61999)">Add to Cart</button>
</div>
</div>

<div class="product">
<img src="nothing.jpg">
<div class="product-info">
<h2 class="product-title">Nothing Phone (2)</h2>
<p class="price">₹44,999</p>
<button onclick="addToCart('Nothing Phone (2)',44999)">Add to Cart</button>
</div>
</div>

</div>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

updateCart();

function addToCart(name,price){

cart.push({
name:name,
price:price
});

localStorage.setItem("cart",JSON.stringify(cart));

updateCart();

alert(name + " added to cart");
}

function updateCart(){
document.getElementById("cartCount").textContent = cart.length;
}

function goToCart(){
window.location.href="cart.html";
}
</script>

</body>
</html>
