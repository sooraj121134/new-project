<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iHub Store</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,#000,#111827);
color:white;
}

header{
background:rgba(17,24,39,0.9);
backdrop-filter:blur(10px);
padding:20px;
text-align:center;
position:sticky;
top:0;
z-index:100;
border-bottom:1px solid #333;
}

.cart{
position:absolute;
right:20px;
top:20px;
background:linear-gradient(45deg,#22c55e,#16a34a);
padding:10px 15px;
border-radius:50px;
cursor:pointer;
font-weight:bold;
box-shadow:0 0 10px rgba(34,197,94,0.5);
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
margin-top:20px;
}

.product{
background:rgba(31,41,55,0.8);
backdrop-filter:blur(10px);
border-radius:15px;
overflow:hidden;
transition:0.3s;
box-shadow:0 5px 15px rgba(0,0,0,0.4);
}

.product:hover{
transform:translateY(-5px);
}

.product img{
width:100%;
height:220px;
object-fit:cover;
}

.product-info{
padding:15px;
}

.price{
color:#60a5fa;
font-size:20px;
margin:10px 0;
}

button{
width:100%;
padding:10px;
border:none;
border-radius:8px;
background:linear-gradient(45deg,#2563eb,#1d4ed8);
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.03);
}
</style>
</head>

<body>

<header>
<h1>🍎 iHub Store</h1>

<div class="cart" onclick="goToCart()">
🛒 <span id="cartCount">0</span>
</div>
</header>

<div class="container">
<div class="products">

<!-- PRODUCTS -->
<script>
const products = [
["iPhone 15",79999,"iphone.jpg"],
["Samsung S24",74999,"samsung.jpg"],
["Pixel 8",69999,"pixel.jpg"],
["OnePlus 12",64999,"oneplus.jpg"],
["Xiaomi 14",59999,"phonrr.jpg"],
["Vivo X100",63999,"vivo.jpg"],
["Oppo Find X7",61999,"oppo.jpg"],
["Nothing Phone 2",44999,"nothing.jpg"]
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function addToCart(name,price){
cart.push({name,price,qty:1});
localStorage.setItem("cart",JSON.stringify(cart));
updateCart();
}

function updateCart(){
document.getElementById("cartCount").innerText = cart.length;
}

function goToCart(){
window.location.href="cart.html";
}
updateCart();
</script>

</div>
</div>

<script>
// render products
const container = document.querySelector(".products");

products.forEach(p=>{
container.innerHTML += `
<div class="product">
<img src="${p[2]}">
<div class="product-info">
<h3>${p[0]}</h3>
<div class="price">₹${p[1]}</div>
<button onclick="addToCart('${p[0]}',${p[1]})">
Add to Cart
</button>
</div>
</div>
`;
});
</script>

</body>
</html>
